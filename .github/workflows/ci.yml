name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/backend/ -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for integration tests
        run: |
          cp .env.example .env
          echo "POSTGRES_DB=tradingcopilot" >> .env
          echo "POSTGRES_USER=trader" >> .env
          echo "POSTGRES_PASSWORD=testpassword" >> .env
          echo "DATABASE_URL=postgresql://trader:testpassword@db:5432/tradingcopilot" >> .env
          echo "SECRET_KEY=ci-test-secret-key" >> .env

      - name: Run integration tests
        run: ./scripts/run-integration-tests.sh

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: tradingcopilot-backend:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: tradingcopilot-frontend:${{ github.sha }}
